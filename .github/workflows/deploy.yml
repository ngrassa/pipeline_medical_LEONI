# =============================================================
#  Pipeline CI/CD — Projet Medical (Django + React)
#  Job 1 : Check    → Vérifie si la VM existe déjà
#  Job 2 : Terraform → Créer la VM (sauté si VM existe)
#  Job 3 : Setup    → Installer prérequis + déployer le projet
#  Job 4 : Run      → Lancer le backend/frontend + afficher URLs
# =============================================================

name: "Deploy Medical Project"

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"

jobs:
  # ═══════════════════════════════════════════════════════════
  #  JOB 1 — Check : La VM existe-t-elle déjà ?
  # ═══════════════════════════════════════════════════════════
  check:
    name: "Job 1 — Check existing VM"
    runs-on: ubuntu-latest

    outputs:
      vm_exists: ${{ steps.check_vm.outputs.vm_exists }}
      server_ip: ${{ steps.check_vm.outputs.server_ip }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier si la VM existe et répond
        id: check_vm
        run: |
          SERVER_IP=""

          # Extraire l'IP depuis terraform.tfstate s'il existe
          if [ -f terraform/terraform.tfstate ]; then
            SERVER_IP=$(python3 -c "
import json
try:
    with open('terraform/terraform.tfstate') as f:
        state = json.load(f)
    for r in state.get('resources', []):
        if r.get('type') == 'aws_eip':
            for inst in r.get('instances', []):
                ip = inst.get('attributes', {}).get('public_ip', '')
                if ip:
                    print(ip)
                    break
except:
    pass
" 2>/dev/null || echo "")
          fi

          if [ -n "$SERVER_IP" ]; then
            echo "📡 IP trouvée dans tfstate : $SERVER_IP"

            # Tester SSH
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
            chmod 600 ~/.ssh/vockey.pem

            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -o BatchMode=yes \
                   -i ~/.ssh/vockey.pem ubuntu@"$SERVER_IP" "echo ok" 2>/dev/null; then
              echo "✅ VM existante et accessible : $SERVER_IP"
              echo "vm_exists=true" >> "$GITHUB_OUTPUT"
              echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "❌ Aucune VM active trouvée — création nécessaire"
          echo "vm_exists=false" >> "$GITHUB_OUTPUT"
          echo "server_ip=" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════
  #  JOB 2 — Terraform : Créer l'infra (SAUTÉ si VM existe)
  # ═══════════════════════════════════════════════════════════
  terraform:
    name: "Job 2 — Provision EC2"
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.vm_exists != 'true'

    outputs:
      server_ip: ${{ steps.tf_output.outputs.server_ip }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan

      - name: Récupérer l'IP publique
        id: tf_output
        working-directory: ./terraform
        run: |
          SERVER_IP=$(terraform output -raw elastic_ip)
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"
          echo "╔══════════════════════════════════════╗"
          echo "║  🆕 Nouvelle VM : $SERVER_IP         ║"
          echo "╚══════════════════════════════════════╝"

      - name: Sauvegarder Terraform State
        if: always()
        working-directory: ./terraform
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git stash -- terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git pull --rebase origin main || true
          git stash pop 2>/dev/null || true
          git add terraform.tfstate terraform.tfstate.backup 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update terraform state [skip ci]"
          git push || echo "⚠️ Push du state échoué"

  # ═══════════════════════════════════════════════════════════
  #  JOB 3 — Setup : Installer les prérequis + déployer
  # ═══════════════════════════════════════════════════════════
  setup:
    name: "Job 3 — Setup & Deploy"
    runs-on: ubuntu-latest
    needs: [check, terraform]
    if: |
      always() &&
      needs.check.result == 'success' &&
      (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déterminer l'IP du serveur
        id: get_ip
        run: |
          if [ "${{ needs.check.outputs.vm_exists }}" == "true" ]; then
            echo "server_ip=${{ needs.check.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
            echo "🔄 Réutilisation VM existante : ${{ needs.check.outputs.server_ip }}"
          else
            echo "server_ip=${{ needs.terraform.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
            echo "🆕 Nouvelle VM : ${{ needs.terraform.outputs.server_ip }}"
          fi

      - name: Attendre que la VM soit prête (SSH)
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
        run: |
          echo "⏳ Attente SSH sur $SERVER_IP ..."
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem

          for i in $(seq 1 40); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                   -i ~/.ssh/vockey.pem ubuntu@$SERVER_IP "echo ok" 2>/dev/null; then
              echo "✅ SSH prêt après $((i*10)) secondes"
              break
            fi
            echo "  Tentative $i/40 — attente 10s..."
            sleep 10
          done

      - name: Copier le script setup sur la VM
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vockey.pem \
            scripts/setup.sh ubuntu@$SERVER_IP:/home/ubuntu/setup.sh

      - name: Exécuter le setup sur la VM
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vockey.pem \
            ubuntu@$SERVER_IP "chmod +x /home/ubuntu/setup.sh && sudo bash /home/ubuntu/setup.sh"

  # ═══════════════════════════════════════════════════════════
  #  JOB 4 — Run : Lancer le projet + afficher les URLs
  # ═══════════════════════════════════════════════════════════
  run:
    name: "Job 4 — Start & Show URLs"
    runs-on: ubuntu-latest
    needs: [check, terraform, setup]
    if: always() && needs.setup.result == 'success'

    steps:
      - name: Déterminer l'IP du serveur
        id: get_ip
        run: |
          if [ "${{ needs.check.outputs.vm_exists }}" == "true" ]; then
            echo "server_ip=${{ needs.check.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
          else
            echo "server_ip=${{ needs.terraform.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configurer SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/vockey.pem
          chmod 600 ~/.ssh/vockey.pem

      - name: Démarrer le backend et le frontend
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vockey.pem ubuntu@$SERVER_IP << 'REMOTE_SCRIPT'
            set -e

            echo "══════════════════════════════════════"
            echo "  Démarrage des services..."
            echo "══════════════════════════════════════"

            # Arrêter les anciens processus s'ils tournent
            sudo pkill -f "manage.py runserver" 2>/dev/null || true
            sudo pkill -f "vite" 2>/dev/null || true
            sleep 2

            # Démarrer MySQL
            sudo service mysql start
            sleep 2

            # Démarrer le Backend Django
            cd /home/ubuntu/medical-projet/pfe-backend
            source /home/ubuntu/medical-projet/venv/bin/activate
            nohup python manage.py runserver 0.0.0.0:8000 > /tmp/backend.log 2>&1 &
            echo "✅ Backend démarré (PID: $!)"

            # Démarrer le Frontend React
            cd /home/ubuntu/medical-projet/pfe-frontend
            nohup npx vite --host 0.0.0.0 --port 5173 > /tmp/frontend.log 2>&1 &
            echo "✅ Frontend démarré (PID: $!)"

            sleep 10

            echo ""
            echo "── Vérification des services ──"
            curl -s -o /dev/null -w "Backend  (port 8000) : HTTP %{http_code}\n" http://localhost:8000/ || echo "Backend  : en attente..."
            curl -s -o /dev/null -w "Frontend (port 5173) : HTTP %{http_code}\n" http://localhost:5173/ || echo "Frontend : en attente..."
          REMOTE_SCRIPT

      - name: Afficher les URLs d'accès
        env:
          SERVER_IP: ${{ steps.get_ip.outputs.server_ip }}
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║        🚀 PROJET MEDICAL — DÉPLOYÉ AVEC SUCCÈS     ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"
          echo "║  🌐 Frontend : http://$SERVER_IP:5173                ║"
          echo "║  🔧 Backend  : http://$SERVER_IP:8000                ║"
          echo "║  📡 API      : http://$SERVER_IP:8000/api/           ║"
          echo "║                                                      ║"
          echo "║  🔑 SSH      : ssh -i vockey.pem ubuntu@$SERVER_IP   ║"
          echo "║                                                      ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
